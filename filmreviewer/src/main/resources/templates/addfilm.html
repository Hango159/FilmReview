<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Film - FilmeReviewer</title>
    <link rel="stylesheet" th:href="@{/css/addfilm.css}">
</head>
<body>
    <div class="add-film-container">
        <h1>Add a New Film</h1>

        <form th:action="@{/save}" th:object="${film}" method="post">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" th:field="*{title}" placeholder="Ex: Star Wars" required/>
            </div>

            <div class="form-group">
                <label for="releaseYear">Release Year</label>
                <input type="text" th:field="*{releaseYear}" placeholder="Ex: 2010" required/>
            </div>

            <div class="form-group">
                <label for="genre">Genre</label>
                <input type="text" th:field="*{genre}" placeholder="Ex: Sci-Fi" required/>
            </div>

            <div class="form-group">
                <label for="imageUrl">URL Imagine Poster</label>
                <input type="text" th:field="*{imageUrl}" placeholder="http://..." />
            </div>

            <button type="submit">Save Film</button>
        </form>

        <a href="/films" class="view-films-link">← Back to Film List</a>
    </div>
</body>
</html>
