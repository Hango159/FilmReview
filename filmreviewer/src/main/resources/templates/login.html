<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - FilmeReviewer</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
    <div class="login-container">
        <h2>Authentication</h2>

        <!-- Mesaj de eroare în cazul în care datele sunt incorecte -->
        <div th:if="${param.error}" class="error-message">
            Invalid username or password!
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="register-link" style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: #718096;">
            Don't have an account? <a th:href="@{/register}" style="color: #3182ce; text-decoration: none; font-weight: 600;">Register now</a>
        </div>
    </div>
</body>
</html>
